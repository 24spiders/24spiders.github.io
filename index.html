<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Liam Bennett</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/24spiders/24spiders.github.io/raw/main/img/tree_icon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Questrial&family=Poppins:wght@300;400;600&display=swap">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: rgb(10, 10, 10);
            --gis-accent: #3C3489;
            --gis-accent-light: #7F77DD;
            --academic-accent: #0F6E56;
            --academic-accent-light: #1D9E75;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.45);
            --divider: rgba(255, 255, 255, 0.07);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: "Poppins", sans-serif;
        }

        .landing {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            padding: 60px 48px;
            text-decoration: none;
            color: inherit;
            transition: flex 0.55s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .panel::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .panel-academic {
            background: #080f0a;
        }

        .panel-academic::before {
            background: radial-gradient(ellipse at 50% 60%, rgba(15, 110, 86, 0.18) 0%, transparent 70%);
        }

        .panel-gis {
            background: #0a0a0a;
            border-left: 1px solid var(--divider);
        }

        .panel-gis::before {
            background: radial-gradient(ellipse at 50% 60%, rgba(60, 52, 137, 0.18) 0%, transparent 70%);
        }

        .panel:hover {
            flex: 1.55;
        }

        .panel:hover::before {
            opacity: 1;
        }

        .panel-icon {
            width: 64px;
            height: 64px;
            opacity: 0.6;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .panel:hover .panel-icon {
            opacity: 1;
            transform: translateY(-4px) scale(1.06);
        }

        .panel-title {
            font-family: "Questrial", sans-serif;
            font-size: 36px;
            font-weight: 400;
            letter-spacing: 0.03em;
            color: #fff;
            transition: letter-spacing 0.35s ease;
        }

        .panel:hover .panel-title {
            letter-spacing: 0.07em;
        }

        .panel-sub {
            font-size: 14px;
            font-weight: 300;
            color: var(--text-muted);
            text-align: center;
            max-width: 220px;
            line-height: 1.7;
            transition: color 0.35s ease;
        }

        .panel:hover .panel-sub {
            color: rgba(255, 255, 255, 0.65);
        }

        .panel-cta {
            margin-top: 6px;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0);
            border: 0.5px solid rgba(255, 255, 255, 0);
            padding: 9px 24px;
            border-radius: 4px;
            transition: color 0.4s ease, border-color 0.4s ease, background 0.4s ease;
        }

        .panel:hover .panel-cta {
            color: rgba(255, 255, 255, 0.75);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .panel-cta:active {
            background: rgba(255, 255, 255, 0.06);
        }

        .accent-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            transform: scaleX(0);
            transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
        }

        .panel-academic .accent-bar {
            background: var(--academic-accent-light);
        }

        .panel-gis .accent-bar {
            background: var(--gis-accent-light);
        }

        .panel:hover .accent-bar {
            transform: scaleX(1);
        }

        .nameplate {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 0;
            z-index: 10;
            pointer-events: none;
        }

        .nameplate-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nameplate-name {
            font-family: "Questrial", sans-serif;
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 0.18em;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
        }

        .nameplate-rule {
            width: 40px;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 640px) {
            .landing {
                flex-direction: column;
            }

            .panel {
                flex: 1;
                border-left: none;
                border-top: 1px solid var(--divider);
            }

            .panel:first-child {
                border-top: none;
            }

            .panel:hover {
                flex: 1.4;
            }

            .panel-title {
                font-size: 28px;
            }

            .panel-sub {
                max-width: 280px;
            }

            .accent-bar {
                bottom: auto;
                top: 0;
                height: 2px;
                transform-origin: center;
            }
        }
    </style>
</head>
<body>
    <div class="nameplate">
        <div class="nameplate-inner">
            <span class="nameplate-name">Liam Bennett</span>
            <div class="nameplate-rule"></div>
        </div>
    </div>

    <div class="landing">
        <a class="panel panel-academic" href="/academic/">
            <svg class="panel-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M32 16 C32 16 20 12 10 14 L10 50 C20 48 32 52 32 52 C32 52 44 48 54 50 L54 14 C44 12 32 16 32 16Z"
                    stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
                <line x1="32" y1="16" x2="32" y2="52" stroke="white" stroke-width="1.5"/>
            </svg>
            <div class="panel-title">Academic</div>
            <div class="panel-sub">Research, publications, and university work</div>
            <div class="panel-cta">Enter &rarr;</div>
            <div class="accent-bar"></div>
        </a>

        <a class="panel panel-gis" href="/gis/">
            <svg class="panel-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="22" stroke="white" stroke-width="1.5"/>
                <ellipse cx="32" cy="32" rx="10" ry="22" stroke="white" stroke-width="1.2"/>
                <line x1="10" y1="32" x2="54" y2="32" stroke="white" stroke-width="1.2"/>
                <line x1="12" y1="21" x2="52" y2="21" stroke="white" stroke-width="0.7" opacity="0.45"/>
                <line x1="12" y1="43" x2="52" y2="43" stroke="white" stroke-width="0.7" opacity="0.45"/>
            </svg>
            <div class="panel-title">GIS Consulting</div>
            <div class="panel-sub">Full-stack spatial data digitization, management, analysis, and web map development</div>
            <div class="panel-cta">Enter &rarr;</div>
            <div class="accent-bar"></div>
        </a>

    </div>
</body>
</html>
